hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: sleap-nn-train
    header: sleap-nn-train — Train SLEAP models from a config YAML file.
    footer: For a detailed list of all available config options, please refer to https://nn.sleap.ai/dev/config/.
    template: "${hydra.help.header}\n\nUsage:\n  ${hydra.help.app_name} --config-dir\
      \ <dir> --config-name <name> [overrides]\n\nCommon overrides:\n  trainer_config.max_epochs=100\n\
      \  trainer_config.batch_size=32\n\nExamples:\n  Start new run:\n    ${hydra.help.app_name}\
      \ --config-dir . --config-name myrun\n  Resume 20 more epochs:\n    ${hydra.help.app_name}\
      \ --config-dir . --config-name myrun \\\n      trainer_config.resume_ckpt_path=<path/to/ckpt>\
      \ \\\n      trainer_config.max_epochs=20\n\nTips:\n  - Use -m/--multirun for\
      \ sweeps; outputs go under hydra.sweep.dir.\n  - For Hydra flags and completion,\
      \ use --hydra-help.\n\n${hydra.help.footer}\n"
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: RUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra/help=sleap_help
    - hydra.mode=RUN
    task: []
  job:
    name: train
    chdir: null
    override_dirname: ''
    id: ???
    num: ???
    config_name: 250826_160705_config
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: /Users/amickl/repos/sleap
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: sleap_nn
      schema: pkg
      provider: main
    - path: /var/folders/yd/5sd75bjx60ndm3jsdxzpbw5h0000gn/T/tmponeew19w
      schema: file
      provider: command-line
    - path: ''
      schema: structured
      provider: schema
    output_dir: /Users/amickl/repos/sleap/outputs/2025-08-26/16-07-23
    choices:
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: sleap_help
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
